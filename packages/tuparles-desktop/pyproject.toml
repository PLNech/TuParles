[tool.poetry]
name = "tuparles"
version = "0.3.0"
description = "Local push-to-talk dictation for Fr-En code-switchers. Speak, see, ship."
authors = ["PLNech <PLNech@users.noreply.github.com>"]
readme = "README.md"
# PEP 420 native namespace package (no src/tuparles/__init__.py) — see
# packages/tuparles-core/pyproject.toml for why. Desktop modules + the optional
# nlp/ layer share the `tuparles` namespace with tuparles-core.
packages = [{ include = "tuparles", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<3.15"
# The portable core — develop=true so edits in packages/tuparles-core are live.
tuparles-core = { path = "../tuparles-core", develop = true }
# Desktop-only runtime (the boundary the import gate enforces): mic, GPU decode,
# global hotkey, X11/Wayland input, Qt GUI.
sounddevice = "^0.5"
numpy = "^2.0"
pynput = "^1.7"
faster-whisper = "^1.2.1"
nvidia-cublas-cu12 = "^12.9.2.10"
nvidia-cudnn-cu12 = "^9.23.1.3"
pyside6-essentials = "^6.11.1"
evdev = "^1.9.3"

# The whisper.cpp CPU rung (#4): a portable, prompt-capable engine that runs
# where faster-whisper's CTranslate2 can't (no-AVX2 x86, ARM Pi) — see
# docs/research/2026-06-28-stt-host-decision.md. Optional + lazy-imported so the
# lean install never pays for the native build; the daemon degrades to it only
# when it's present and the GPU isn't (GPU-or-CPU, never GPU-or-nothing).
[tool.poetry.group.whispercpp]
optional = true

[tool.poetry.group.whispercpp.dependencies]
pywhispercpp = ">=1.2"

# Silence-trim VAD (#131): silero-vad (ONNX CPU) is the primary lead/tail trim
# tier for `preprocess.trim_silence`. Optional + lazy-imported so the lean
# install never pays for onnxruntime — trim degrades to a deterministic RMS cut
# without it (GPU-or-CPU, never GPU-or-nothing). `poetry install --with trim`.
[tool.poetry.group.trim]
optional = true

[tool.poetry.group.trim.dependencies]
silero-vad = ">=5.1"
onnxruntime = ">=1.17"

[tool.poetry.scripts]
tuparles = "tuparles.cli:main"

[build-system]
requires = ["poetry-core>=2.0"]
build-backend = "poetry.core.masonry.api"
