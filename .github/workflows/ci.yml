name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The pure-python layers (punctuation, lexicon, history, settings,
    # preprocess, repeats, vocab, engine recovery) carry the suite — no GPU,
    # no Qt, no audio stack. They need only numpy, so they run cross-OS.
    # CUDA and the Qt/audio frontends can't run on hosted runners (no GPU,
    # no display); they're validated locally on the dev machine.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Light, portable deps only: the corpus-analysis core (nlp/) needs
      # markdown-it-py / scikit-learn / yake; the heavy embedding backends
      # (fastembed, torch) live in the optional `embed` group and their tests
      # are deselected by default (`-m 'not gpu and not embed'`), so the matrix
      # never touches them.
      - run: pip install pytest pytest-cov ruff mypy numpy markdown-it-py scikit-learn yake
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts
      - run: mypy
      - run: pytest -q
        env:
          PYTHONPATH: src
