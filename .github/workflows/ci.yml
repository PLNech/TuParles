name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The test suite covers the pure-python layers (punctuation, lexicon,
      # history, settings) — no GPU, no Qt, no audio stack needed in CI.
      - run: pip install pytest ruff
      - run: ruff check src tests scripts
      - run: PYTHONPATH=src pytest -q
