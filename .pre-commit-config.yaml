# Local quality gate — runs before every commit so a 5-minute CI round-trip
# becomes 5-second local feedback. Install once: `poetry run pre-commit install`.
# Run on demand: `poetry run pre-commit run --all-files`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff          # lint (with --fix)
        args: [--fix]
      - id: ruff-format   # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        # Mirror the pyproject config; pass no files so mypy reads `files=`.
        pass_filenames: false
        additional_dependencies: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
